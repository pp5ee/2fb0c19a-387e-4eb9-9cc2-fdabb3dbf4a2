<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .score-board {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        #score, #highScore {
            color: #00ff88;
            font-weight: bold;
        }

        #highScore {
            color: #ffd700;
        }

        .game-status {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #00ff88;
            min-height: 1.5rem;
        }

        .game-status.paused {
            color: #ffaa00;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        #restartBtn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #restartBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        .game-over h2 {
            font-size: 3rem;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div class="score-board">得分: <span id="score">0</span> | 最高分: <span id="highScore">0</span></div>
    <div class="game-status" id="gameStatus"></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button id="restartBtn" onclick="restartGame()">重新开始</button>
    <p class="instructions">使用方向键 ↑ ↓ ← → 控制蛇的移动 | 空格键暂停/继续</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameStatusElement = document.getElementById('gameStatus');
        const restartBtn = document.getElementById('restartBtn');

        const GRID_SIZE = 20;
        const GRID_COUNT = canvas.width / GRID_SIZE;
        const HIGH_SCORE_KEY = 'snakeGameHighScore';

        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = 0;
        let gameLoop = null;
        let isGameOver = false;
        let isPaused = false;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            isGameOver = false;
            isPaused = false;
            scoreElement.textContent = score;
            highScore = parseInt(localStorage.getItem(HIGH_SCORE_KEY)) || 0;
            highScoreElement.textContent = highScore;
            gameStatusElement.textContent = '';
            gameStatusElement.classList.remove('paused');
            restartBtn.style.display = 'none';
            spawnFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
        }

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem(HIGH_SCORE_KEY, highScore);
            }
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                gameStatusElement.textContent = '已暂停 - 按空格键继续';
                gameStatusElement.classList.add('paused');
            } else {
                gameStatusElement.textContent = '';
                gameStatusElement.classList.remove('paused');
            }
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * GRID_COUNT),
                y: Math.floor(Math.random() * GRID_COUNT)
            };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }

        function update() {
            if (isGameOver || isPaused) return;

            // Apply buffered direction
            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                updateHighScore();
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff88';
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const isHead = i === 0;
                ctx.fillStyle = isHead ? '#00ff88' : '#00cc6a';
                ctx.fillRect(segment.x * GRID_SIZE, segment.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
            }

            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            updateHighScore();
            restartBtn.style.display = 'block';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4444';
            ctx.font = '2.5rem sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2);
            ctx.font = '1.2rem sans-serif';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`最终得分: ${score}  最高分: ${highScore}`, canvas.width / 2, canvas.height / 2 + 40);
        }

        function restartGame() {
            initGame();
        }

        document.addEventListener('keydown', (e) => {
            // Handle pause with Space key
            if (e.code === 'Space') {
                togglePause();
                e.preventDefault();
                return;
            }

            // Don't process direction changes when paused
            if (isPaused || isGameOver) return;

            const keyMap = {
                'ArrowUp': { x: 0, y: -1 },
                'ArrowDown': { x: 0, y: 1 },
                'ArrowLeft': { x: -1, y: 0 },
                'ArrowRight': { x: 1, y: 0 }
            };

            const newDir = keyMap[e.key];
            if (newDir) {
                // Prevent reversing direction into itself
                if ((newDir.x !== 0 && direction.x === 0) ||
                    (newDir.y !== 0 && direction.y === 0)) {
                    nextDirection = newDir;
                }
                e.preventDefault();
            }
        });

        initGame();
    </script>
</body>
</html>
